<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Maintenance Countdown</title>
    <style>
        /* Reset & Base - Kompatibel WebView Lama */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #667eea;
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        /* Overlay - Tanpa backdrop-filter yang bermasalah */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: flex-start;
            align-items: flex-start;
            padding: 15px;
            overflow-y: auto;
        }
        /* Container - Gradient sederhana */
        .maintenance-container {
            background: #1e2a4a;
            border-radius: 16px;
            padding: 20px 15px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
            margin-top: 8vh;
        }

        /* Icon Tools */
        .tools-icon {
            width: 65px;
            height: 65px;
            margin: 0 auto 15px;
            background: #ff6b6b;
            border-radius: 50%;
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
        }

        .tools-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        /* Title */
        .maintenance-title {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            line-height: 1.3;
        }

        /* Countdown - Layout fleksibel */
        .countdown-container {
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;            -webkit-align-items: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .time-box {
            background: #2d3748;
            border-radius: 10px;
            padding: 12px 10px;
            min-width: 65px;
            border: 1px solid #444;
            -webkit-flex: 1;
            flex: 1;
            max-width: 80px;
        }

        .time-value {
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            display: block;
            line-height: 1;
            margin-bottom: 5px;
            font-family: monospace;
        }

        .time-label {
            color: #aaa;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .separator {
            color: #ff6b6b;
            font-size: 24px;
            font-weight: bold;
            margin: 0 2px;
        }

        /* Finish Button */
        .finish-button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;            font-weight: bold;
            cursor: pointer;
            display: -webkit-inline-flex;
            display: inline-flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            max-width: 280px;
            margin: 0 auto 15px;
        }

        .finish-button:active {
            opacity: 0.9;
        }

        .finish-button svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        #finish-time {
            font-family: monospace;
            font-weight: bold;
        }

        /* Settings Panel */
        .settings-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .settings-title {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .time-input-group {
            display: -webkit-flex;
            display: flex;
            gap: 5px;
            -webkit-justify-content: center;
            justify-content: center;
            margin-bottom: 10px;
            flex-wrap: wrap;        }

        .time-input {
            background: #333;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 5px;
            color: white;
            width: 60px;
            text-align: center;
            font-size: 14px;
        }

        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .set-button {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 180px;
            margin: 0 auto;
            display: block;
        }

        .set-button:active {
            opacity: 0.9;
        }

        .set-button.reset {
            background: #fc8181;
            margin-top: 8px;
        }

        /* Status Indicator */
        .status-indicator {
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
            color: #68d391;
            font-size: 12px;
            font-weight: bold;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #68d391;
            border-radius: 50%;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .maintenance-container {
                padding: 15px 10px;
                margin-top: 5vh;
            }
            .maintenance-title { font-size: 18px; }
            .time-box { min-width: 55px; padding: 10px 8px; }
            .time-value { font-size: 28px; }
            .time-label { font-size: 9px; }
            .separator { font-size: 20px; }
            .tools-icon { width: 55px; height: 55px; }
            .tools-icon svg { width: 28px; height: 28px; }
        }

        .overlay.hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay">
        <div class="maintenance-container">
            <!-- Status -->
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Maintenance Aktif</span>
            </div>

            <!-- Icon -->
            <div class="tools-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
                </svg>
            </div>
            <!-- Title -->
            <h1 class="maintenance-title">MAINTENANCE BERLANGSUNG</h1>

            <!-- Countdown -->
            <div class="countdown-container">
                <div class="time-box">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">Jam</span>
                </div>
                <div class="separator">:</div>
                <div class="time-box">
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">Menit</span>
                </div>
                <div class="separator">:</div>
                <div class="time-box">
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">Detik</span>
                </div>
            </div>

            <!-- Finish Button -->
            <button class="finish-button" id="finishBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-1.01-1.41-1.51l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
                </svg>
                Selesai: <span id="finish-time">00:00:00</span>
            </button>

            <!-- Settings (Developer Only) -->
            <div class="settings-panel">
                <div class="settings-title">⚙️ Atur Waktu</div>
                <div class="time-input-group">
            </div>
        </div>
    </div>

    <script>
        // === KONFIGURASI ===
        var STORAGE_KEY = 'maintenance_end_time';
        var DEFAULT_DURATION = (24 + 59 * 60) + 59;
        
        var countdownInterval = null;
        var endTime = null;
        // === FUNGSI HELPERS (Kompatibel Lama) ===
        function safeGetElement(id) {
            try {
                return document.getElementById(id);
            } catch(e) {
                console.log('Element not found: ' + id);
                return null;
            }
        }

        function safeLocalStorage(action, key, value) {
            try {
                if (action === 'get') {
                    return localStorage.getItem(key);
                } else if (action === 'set') {
                    localStorage.setItem(key, value);
                    return true;
                } else if (action === 'remove') {
                    localStorage.removeItem(key);
                    return true;
                }
            } catch(e) {
                console.log('LocalStorage error: ' + e.message);
                return null;
            }
        }

        function pad(num) {
            return (num < 10 ? '0' : '') + num;
        }

        // === FUNGSI UTAMA ===
        function getRemainingSeconds() {
            try {
                var now = Date.now ? Date.now() : new Date().getTime();
                var remaining = Math.floor((endTime - now) / 1000);
                return Math.max(0, remaining);
            } catch(e) {
                console.log('Time calc error: ' + e.message);
                return 0;
            }
        }

        function updateCountdown() {
            try {
                var totalSeconds = getRemainingSeconds();
                
                var hours = Math.floor(totalSeconds / 3600);
                var minutes = Math.floor((totalSeconds % 3600) / 60);                var seconds = totalSeconds % 60;

                var hEl = safeGetElement('hours');
                var mEl = safeGetElement('minutes');
                var sEl = safeGetElement('seconds');
                var ftEl = safeGetElement('finish-time');

                if (hEl) hEl.textContent = pad(hours);
                if (mEl) mEl.textContent = pad(minutes);
                if (sEl) sEl.textContent = pad(seconds);
                if (ftEl) ftEl.textContent = pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);

                if (totalSeconds <= 0) {
                    onMaintenanceFinished();
                    return false;
                }
                return true;
            } catch(e) {
                console.log('Update error: ' + e.message);
                return false;
            }
        }

        function onMaintenanceFinished() {
            try {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                
                // Callback ke APK
                if (window.AndroidInterface && typeof window.AndroidInterface.onMaintenanceFinished === 'function') {
                    window.AndroidInterface.onMaintenanceFinished();
                }
                
                console.log('Maintenance finished');
            } catch(e) {
                console.log('Finish error: ' + e.message);
            }
        }

        function startCountdown() {
            try {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                }
                
                if (updateCountdown()) {
                    countdownInterval = setInterval(updateCountdown, 1000);
                }            } catch(e) {
                console.log('Start error: ' + e.message);
            }
        }

        function setNewEndTime(durationSeconds) {
            try {
                var now = Date.now ? Date.now() : new Date().getTime();
                endTime = now + (durationSeconds * 1000);
                safeLocalStorage('set', STORAGE_KEY, endTime.toString());
                startCountdown();
            } catch(e) {
                console.log('SetEndTime error: ' + e.message);
            }
        }

        // === FUNGSI PUBLIK ===
        function setCustomTime() {
            try {
                var hInput = safeGetElement('inputHours');
                var mInput = safeGetElement('inputMinutes');
                var sInput = safeGetElement('inputSeconds');
                
                var hours = parseInt(hInput && hInput.value) || 0;
                var minutes = parseInt(mInput && mInput.value) || 0;
                var seconds = parseInt(sInput && sInput.value) || 0;

                var totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
                
                if (totalSeconds > 0) {
                    setNewEndTime(totalSeconds);
                } else {
                    alert('Masukkan waktu yang valid!');
                }
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }

        function resetTimer() {
            try {
                safeLocalStorage('remove', STORAGE_KEY);
                setNewEndTime(DEFAULT_DURATION);
            } catch(e) {
                alert('Reset error: ' + e.message);
            }
        }

        function setTimeFromURL() {
            try {                var query = window.location.search || '';
                if (query.indexOf('?') === 0) {
                    query = query.substring(1);
                }
                
                var params = {};
                var pairs = query.split('&');
                for (var i = 0; i < pairs.length; i++) {
                    var parts = pairs[i].split('=');
                    if (parts.length === 2) {
                        params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
                    }
                }
                
                var hours = parseInt(params['hours']) || 0;
                var minutes = parseInt(params['minutes']) || 0;
                var seconds = parseInt(params['seconds']) || 0;
                
                if (hours > 0 || minutes > 0 || seconds > 0) {
                    var totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
                    setNewEndTime(totalSeconds);
                    return true;
                }
            } catch(e) {
                console.log('URL parse error: ' + e.message);
            }
            return false;
        }

        // === WebView Android Bridge ===
        window.setMaintenanceTime = function(hours, minutes, seconds) {
            try {
                var totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
                if (totalSeconds > 0) {
                    setNewEndTime(totalSeconds);
                }
            } catch(e) {
                console.log('Bridge error: ' + e.message);
            }
        };

        window.pauseMaintenanceTimer = function() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
        };
        
        window.resumeMaintenanceTimer = function() {
            if (endTime && !countdownInterval) {                startCountdown();
            }
        };

        // === INISIALISASI ===
        function init() {
            try {
                // Prioritas: URL > localStorage > default
                if (setTimeFromURL()) {
                    return;
                }
                
                var saved = safeLocalStorage('get', STORAGE_KEY);
                if (saved) {
                    endTime = parseInt(saved);
                    if (endTime && getRemainingSeconds() > 0) {
                        startCountdown();
                        return;
                    } else {
                        safeLocalStorage('remove', STORAGE_KEY);
                    }
                }
                
                setNewEndTime(DEFAULT_DURATION);
            } catch(e) {
                console.log('Init error: ' + e.message);
                // Fallback: mulai dengan default
                setNewEndTime(DEFAULT_DURATION);
            }
        }

        // === GLOBAL ERROR HANDLER ===
        window.onerror = function(msg, src, line, col, err) {
            console.log('Global error: ' + msg + ' at ' + line + ':' + col);
            // Jangan biarkan error menghentikan eksekusi
            return true;
        };

        // === RUN ===
        if (document.addEventListener) {
            document.addEventListener('DOMContentLoaded', init);
        } else if (document.attachEvent) {
            document.attachEvent('onreadystatechange', function() {
                if (document.readyState === 'complete') init();
            });
        }
        
        // Fallback immediate
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(init, 0);        }

        // Visibility handler
        if (document.addEventListener) {
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && endTime) {
                    startCountdown();
                }
            });
        }
    </script>

</body>
</html>
